<!-- 
  道具 - 星星
  尺寸：80x80px
  用途：收集品、得分道具
-->
<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 星星渐变 -->
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 发光层 -->
  <polygon 
    points="40,5 47,30 73,30 52,45 60,70 40,55 20,70 28,45 7,30 33,30"
    fill="url(#starGradient)"
    stroke="#8B4513"
    stroke-width="2"
    filter="url(#glow)"
  />
  
  <!-- 星星主体 -->
  <polygon 
    points="40,8 46,28 70,28 50,43 58,67 40,52 22,67 30,43 10,28 34,28"
    fill="url(#starGradient)"
    stroke="#8B4513"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  
  <!-- 高光 -->
  <polygon 
    points="40,15 43,25 50,25 44,30 46,38 40,34 34,38 36,30 30,25 37,25"
    fill="#FFFFFF"
    opacity="0.4"
  />
  
  <!-- 闪烁小星（装饰） -->
  <circle cx="15" cy="15" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="65" cy="20" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="70" cy="60" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="10" cy="55" r="1.5" fill="#FFD700" opacity="0.5"/>
</svg>

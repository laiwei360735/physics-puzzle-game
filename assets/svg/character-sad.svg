<!-- 
  主角角色 - 难过表情
  尺寸：100x100px
  用途：失败/受伤时显示
-->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradientSad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 身体 -->
  <circle cx="50" cy="50" r="45" fill="url(#bodyGradientSad)" stroke="#8B4513" stroke-width="3"/>
  
  <!-- 眼睛（下垂） -->
  <ellipse cx="35" cy="42" rx="8" ry="10" fill="#FFFFFF" stroke="#8B4513" stroke-width="2"/>
  <ellipse cx="65" cy="42" rx="8" ry="10" fill="#FFFFFF" stroke="#8B4513" stroke-width="2"/>
  <path d="M 27 32 Q 35 36 43 32" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 57 32 Q 65 36 73 32" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 眼珠 -->
  <circle cx="35" cy="44" r="4" fill="#000000"/>
  <circle cx="65" cy="44" r="4" fill="#000000"/>
  
  <!-- 腮红（淡化） -->
  <circle cx="25" cy="55" r="5" fill="#FFB6C1" opacity="0.4"/>
  <circle cx="75" cy="55" r="5" fill="#FFB6C1" opacity="0.4"/>
  
  <!-- 嘴巴（难过） -->
  <path d="M 35 68 Q 50 58 65 68" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 汗滴 -->
  <path d="M 75 30 Q 80 35 78 40 Q 75 45 73 40 Q 70 35 75 30" fill="#87CEEB" stroke="#8B4513" stroke-width="1"/>
  
  <!-- 高光 -->
  <ellipse cx="35" cy="25" rx="8" ry="5" fill="#FFFFFF" opacity="0.3"/>
</svg>

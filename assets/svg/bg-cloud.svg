<!-- 
  背景元素 - 云朵
  尺寸：200x100px
  用途：天空背景装饰
-->
<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 云朵渐变 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="cloudShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#B0E0E6" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- 云朵主体（多个圆形组合） -->
  <g filter="url(#cloudShadow)">
    <!-- 左下圆 -->
    <ellipse cx="50" cy="70" rx="40" ry="25" fill="url(#cloudGradient)"/>
    
    <!-- 中下圆 -->
    <ellipse cx="100" cy="65" rx="50" ry="30" fill="url(#cloudGradient)"/>
    
    <!-- 右下圆 -->
    <ellipse cx="150" cy="70" rx="35" ry="22" fill="url(#cloudGradient)"/>
    
    <!-- 左上圆 -->
    <ellipse cx="70" cy="50" rx="35" ry="25" fill="url(#cloudGradient)"/>
    
    <!-- 中上圆（最大） -->
    <ellipse cx="110" cy="45" rx="45" ry="30" fill="url(#cloudGradient)"/>
    
    <!-- 右上圆 -->
    <ellipse cx="145" cy="52" rx="30" ry="20" fill="url(#cloudGradient)"/>
  </g>
  
  <!-- 高光 -->
  <ellipse cx="90" cy="40" rx="20" ry="10" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="130" cy="45" rx="15" ry="8" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- 底部阴影 -->
  <ellipse cx="100" cy="75" rx="70" ry="10" fill="#B0E0E6" opacity="0.3"/>
</svg>

<!-- 
  道具 - 爱心
  尺寸：80x80px
  用途：生命值、奖励道具
-->
<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 爱心渐变 -->
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 爱心主体 -->
  <path 
    d="M 40 70 
       C 40 70 10 45 10 25 
       C 10 10 25 5 40 15 
       C 55 5 70 10 70 25 
       C 70 45 40 70 40 70 Z"
    fill="url(#heartGradient)"
    stroke="#8B4513"
    stroke-width="3"
    stroke-linejoin="round"
    filter="url(#heartGlow)"
  />
  
  <!-- 高光 -->
  <ellipse cx="25" cy="25" rx="8" ry="6" fill="#FFFFFF" opacity="0.4"/>
  <ellipse cx="55" cy="25" rx="8" ry="6" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- 中心高光 -->
  <circle cx="40" cy="35" r="5" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- 装饰小爱心 -->
  <path 
    d="M 65 10 C 65 10 60 5 60 8 C 60 10 65 15 65 15 C 65 15 70 10 70 8 C 70 5 65 10 65 10 Z"
    fill="#FFB6C1"
    opacity="0.6"
  />
  
  <path 
    d="M 15 12 C 15 12 11 7 11 9 C 11 11 15 15 15 15 C 15 15 19 11 19 9 C 19 7 15 12 15 12 Z"
    fill="#FFB6C1"
    opacity="0.5"
  />
</svg>

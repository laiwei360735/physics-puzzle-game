<!-- 
  道具 - 弹簧
  尺寸：60x80px
  用途：弹跳道具、机关
-->
<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 弹簧渐变 -->
    <linearGradient id="springGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 底座渐变 -->
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 底座 -->
  <rect x="10" y="70" width="40" height="8" rx="3" fill="url(#baseGradient)" stroke="#553311" stroke-width="2"/>
  
  <!-- 弹簧线圈（从下往上） -->
  <path 
    d="M 20 70 
       Q 10 65 20 60 
       Q 30 55 40 60 
       Q 50 65 40 70"
    fill="none"
    stroke="url(#springGradient)"
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <path 
    d="M 20 60 
       Q 10 55 20 50 
       Q 30 45 40 50 
       Q 50 55 40 60"
    fill="none"
    stroke="url(#springGradient)"
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <path 
    d="M 20 50 
       Q 10 45 20 40 
       Q 30 35 40 40 
       Q 50 45 40 50"
    fill="none"
    stroke="url(#springGradient)"
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <path 
    d="M 20 40 
       Q 10 35 20 30 
       Q 30 25 40 30 
       Q 50 35 40 40"
    fill="none"
    stroke="url(#springGradient)"
    stroke-width="6"
    stroke-linecap="round"
  />
  
  <!-- 顶部平台 -->
  <ellipse cx="30" cy="25" rx="20" ry="8" fill="url(#springGradient)" stroke="#8B4513" stroke-width="2"/>
  <ellipse cx="30" cy="23" rx="15" ry="5" fill="#FFD700" opacity="0.5"/>
  
  <!-- 高光 -->
  <ellipse cx="25" cy="28" rx="8" ry="3" fill="#FFFFFF" opacity="0.4"/>
</svg>

<!-- 
  道具 - 气泡
  尺寸：80x80px
  用途：漂浮道具、保护罩
-->
<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 气泡渐变 -->
    <radialGradient id="bubbleGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#87CEEB;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#87CEEB;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- 气泡边框渐变 -->
    <linearGradient id="bubbleBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#87CEEB;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- 气泡主体 -->
  <circle cx="40" cy="40" r="35" fill="url(#bubbleGradient)" stroke="url(#bubbleBorder)" stroke-width="2"/>
  
  <!-- 高光（主要） -->
  <ellipse cx="28" cy="28" rx="10" ry="7" fill="#FFFFFF" opacity="0.6"/>
  <ellipse cx="26" cy="26" rx="5" ry="3" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- 高光（次要） -->
  <ellipse cx="55" cy="50" rx="5" ry="3" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- 反光 -->
  <path d="M 50 60 Q 60 65 65 60" stroke="#87CEEB" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- 小气泡装饰 -->
  <circle cx="65" cy="20" r="4" fill="url(#bubbleGradient)" stroke="#87CEEB" stroke-width="1" opacity="0.6"/>
  <circle cx="70" cy="35" r="3" fill="url(#bubbleGradient)" stroke="#87CEEB" stroke-width="1" opacity="0.5"/>
  <circle cx="15" cy="60" r="3" fill="url(#bubbleGradient)" stroke="#87CEEB" stroke-width="1" opacity="0.4"/>
  
  <!-- 气泡内部光晕 -->
  <circle cx="40" cy="40" r="20" fill="#FFFFFF" opacity="0.1"/>
</svg>

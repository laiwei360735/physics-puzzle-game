<!-- 
  主角角色 - 开心表情
  尺寸：100x100px
  用途：成功/得分时显示
-->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradientHappy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 身体 -->
  <circle cx="50" cy="50" r="45" fill="url(#bodyGradientHappy)" stroke="#8B4513" stroke-width="3"/>
  
  <!-- 眼睛（开心眯眼） -->
  <path d="M 25 38 Q 35 32 45 38" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 55 38 Q 65 32 75 38" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <circle cx="25" cy="55" r="7" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="75" cy="55" r="7" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- 嘴巴（大笑） -->
  <ellipse cx="50" cy="65" rx="15" ry="10" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
  <path d="M 35 62 Q 50 75 65 62" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 高光 -->
  <ellipse cx="35" cy="25" rx="8" ry="5" fill="#FFFFFF" opacity="0.4"/>
</svg>

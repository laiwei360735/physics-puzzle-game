<!-- 
  UI 界面 - 结算界面
  尺寸：750x1334px
  用途：关卡完成/失败结算
-->
<svg viewBox="0 0 750 1334" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="successBG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#98FB98;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FFF0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="starGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glowSuccess">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="750" height="1334" fill="url(#successBG)"/>
  
  <!-- 庆祝彩带（装饰） -->
  <g stroke="#FFD700" stroke-width="3" fill="none" opacity="0.6">
    <path d="M 100 100 Q 200 150 150 250"/>
    <path d="M 650 100 Q 550 150 600 250"/>
    <path d="M 200 50 Q 300 100 250 200"/>
    <path d="M 550 50 Q 450 100 500 200"/>
  </g>
  
  <!-- 标题文字 -->
  <g transform="translate(375, 150)">
    <text x="0" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="72" font-weight="bold" fill="#228B22" text-anchor="middle">关卡完成!</text>
  </g>
  
  <!-- 星星评价区域 -->
  <g transform="translate(375, 350)">
    <!-- 星星 1 -->
    <g transform="translate(-150, 0)">
      <polygon points="0,-60 18,-20 60,-20 28,10 38,50 0,25 -38,50 -28,10 -60,-20 -18,-20" fill="url(#starGold)" stroke="#8B4513" stroke-width="3" filter="url(#glowSuccess)"/>
      <polygon points="0,-45 12,-15 45,-15 20,8 28,38 0,18 -28,38 -20,8 -45,-15 -12,-15" fill="#FFFFFF" opacity="0.3"/>
    </g>
    
    <!-- 星星 2 -->
    <g transform="translate(0, 0)">
      <polygon points="0,-70 20,-25 70,-25 35,10 45,60 0,30 -45,60 -35,10 -70,-25 -20,-25" fill="url(#starGold)" stroke="#8B4513" stroke-width="4" filter="url(#glowSuccess)"/>
      <polygon points="0,-50 15,-20 50,-20 25,5 32,40 0,20 -32,40 -25,5 -50,-20 -15,-20" fill="#FFFFFF" opacity="0.3"/>
    </g>
    
    <!-- 星星 3 -->
    <g transform="translate(150, 0)">
      <polygon points="0,-60 18,-20 60,-20 28,10 38,50 0,25 -38,50 -28,10 -60,-20 -18,-20" fill="url(#starGold)" stroke="#8B4513" stroke-width="3" filter="url(#glowSuccess)"/>
      <polygon points="0,-45 12,-15 45,-15 20,8 28,38 0,18 -28,38 -20,8 -45,-15 -12,-15" fill="#FFFFFF" opacity="0.3"/>
    </g>
  </g>
  
  <!-- 得分面板 -->
  <g transform="translate(75, 550)">
    <rect x="0" y="0" width="600" height="280" rx="30" fill="#FFFFFF" stroke="#8B4513" stroke-width="4"/>
    
    <!-- 面板标题 -->
    <text x="300" y="50" font-family="Arial Rounded MT Bold, sans-serif" font-size="36" font-weight="bold" fill="#8B4513" text-anchor="middle">得分统计</text>
    
    <!-- 得分项 1 -->
    <g transform="translate(50, 100)">
      <text x="0" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="28" fill="#555555">基础得分</text>
      <text x="500" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="32" font-weight="bold" fill="#FFA500" text-anchor="end">1000</text>
    </g>
    
    <!-- 分隔线 -->
    <line x1="50" y1="120" x2="550" y2="120" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- 得分项 2 -->
    <g transform="translate(50, 160)">
      <text x="0" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="28" fill="#555555">时间奖励</text>
      <text x="500" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="32" font-weight="bold" fill="#90EE90" text-anchor="end">+500</text>
    </g>
    
    <!-- 分隔线 -->
    <line x1="50" y1="180" x2="550" y2="180" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- 得分项 3 -->
    <g transform="translate(50, 220)">
      <text x="0" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="28" fill="#555555">收集奖励</text>
      <text x="500" y="0" font-family="Arial Rounded MT Bold, sans-serif" font-size="32" font-weight="bold" fill="#87CEEB" text-anchor="end">+300</text>
    </g>
    
    <!-- 分隔线 -->
    <line x1="50" y1="240" x2="550" y2="240" stroke="#E0E0E0" stroke-width="2"/>
  </g>
  
  <!-- 总分 -->
  <g transform="translate(75, 860)">
    <rect x="0" y="0" width="600" height="100" rx="20" fill="#FFA500" stroke="#8B4513" stroke-width="4"/>
    <text x="150" y="65" font-family="Arial Rounded MT Bold, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF">总分</text>
    <text x="550" y="65" font-family="Arial Rounded MT Bold, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="end">1800</text>
  </g>
  
  <!-- 按钮组 -->
  <!-- 下一关按钮 -->
  <g transform="translate(175, 1000)">
    <rect x="0" y="0" width="400" height="90" rx="25" fill="#90EE90" stroke="#228B22" stroke-width="4"/>
    <text x="200" y="58" font-family="Arial Rounded MT Bold, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">下一关</text>
  </g>
  
  <!-- 返回按钮 -->
  <g transform="translate(175, 1120)">
    <rect x="0" y="0" width="400" height="70" rx="20" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
    <text x="200" y="48" font-family="Arial Rounded MT Bold, sans-serif" font-size="32" font-weight="bold" fill="#8B4513" text-anchor="middle">返回关卡</text>
  </g>
  
  <!-- 主角庆祝（右下角） -->
  <g transform="translate(520, 1050)">
    <circle cx="80" cy="80" r="70" fill="#FFD700" stroke="#8B4513" stroke-width="3"/>
    <!-- 开心眼睛 -->
    <path d="M 50 65 Q 60 55 70 65" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 90 65 Q 100 55 110 65" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 大笑嘴巴 -->
    <ellipse cx="80" cy="95" rx="25" ry="15" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
    <!-- 腮红 -->
    <circle cx="45" cy="85" r="10" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="115" cy="85" r="10" fill="#FFB6C1" opacity="0.6"/>
  </g>
</svg>

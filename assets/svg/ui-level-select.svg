<!-- 
  UI 界面 - 关卡选择
  尺寸：750x1334px
  用途：关卡选择界面
-->
<svg viewBox="0 0 750 1334" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyBG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="levelCardLocked" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D3D3D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A9A9A9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="levelCardUnlocked" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="levelCardCompleted" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3CB371;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="750" height="1334" fill="url(#skyBG2)"/>
  
  <!-- 顶部导航栏 -->
  <g transform="translate(0, 0)">
    <rect width="750" height="120" fill="#87CEEB" stroke="#8B4513" stroke-width="3"/>
    <!-- 返回按钮 -->
    <g transform="translate(30, 30)">
      <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
      <path d="M 40 30 L 20 30 L 25 25" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- 标题 -->
    <text x="375" y="75" font-family="Arial Rounded MT Bold, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">关卡选择</text>
  </g>
  
  <!-- 关卡网格 -->
  <!-- 第 1 行 -->
  <g transform="translate(75, 180)">
    <!-- 关卡 1（已完成） -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardCompleted)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
      <!-- 星星评价 -->
      <g transform="translate(90, 140)">
        <polygon points="-15,-10 -10,5 -15,5" fill="#FFD700"/>
        <polygon points="0,-10 -5,5 0,5" fill="#FFD700"/>
        <polygon points="15,-10 10,5 15,5" fill="#FFD700"/>
      </g>
    </g>
    
    <!-- 关卡 2（已完成） -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardCompleted)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
      <g transform="translate(90, 140)">
        <polygon points="-15,-10 -10,5 -15,5" fill="#FFD700"/>
        <polygon points="0,-10 -5,5 0,5" fill="#FFD700"/>
        <polygon points="15,-10 10,5 15,5" fill="#FFD700"/>
      </g>
    </g>
    
    <!-- 关卡 3（当前） -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardUnlocked)" stroke="#8B4513" stroke-width="4"/>
      <!-- 高亮边框 -->
      <rect x="-5" y="-5" width="190" height="190" rx="25" fill="none" stroke="#FFD700" stroke-width="5" stroke-dasharray="10,5"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
      <text x="90" y="160" font-family="Arial Rounded MT Bold, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">进行中</text>
    </g>
  </g>
  
  <!-- 第 2 行 -->
  <g transform="translate(75, 400)">
    <!-- 关卡 4（未解锁） -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">4</text>
      <!-- 锁 -->
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
    
    <!-- 关卡 5（未解锁） -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">5</text>
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
    
    <!-- 关卡 6（未解锁） -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">6</text>
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
  </g>
  
  <!-- 第 3 行 -->
  <g transform="translate(75, 620)">
    <!-- 关卡 7-9（未解锁） -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">7</text>
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
    
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">8</text>
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
    
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="180" rx="20" fill="url(#levelCardLocked)" stroke="#8B4513" stroke-width="4"/>
      <text x="90" y="100" font-family="Arial Rounded MT Bold, sans-serif" font-size="60" font-weight="bold" fill="#666666" text-anchor="middle">9</text>
      <g transform="translate(90, 140)">
        <rect x="-15" y="-10" width="30" height="25" rx="5" fill="#8B4513"/>
        <path d="M -10 -10 Q -10 -25 0 -25 Q 10 -25 10 -10" stroke="#8B4513" stroke-width="4" fill="none"/>
      </g>
    </g>
  </g>
  
  <!-- 进度信息面板 -->
  <g transform="translate(75, 880)">
    <rect x="0" y="0" width="600" height="120" rx="20" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
    <text x="40" y="50" font-family="Arial Rounded MT Bold, sans-serif" font-size="32" font-weight="bold" fill="#8B4513">总进度</text>
    <!-- 进度条背景 -->
    <rect x="40" y="70" width="520" height="30" rx="15" fill="#E0E0E0"/>
    <!-- 进度条填充 -->
    <rect x="40" y="70" width="173" height="30" rx="15" fill="#90EE90" stroke="#3CB371" stroke-width="2"/>
    <text x="600" y="92" font-family="Arial Rounded MT Bold, sans-serif" font-size="28" fill="#8B4513">2/9</text>
  </g>
  
  <!-- 底部装饰 -->
  <g transform="translate(0, 1100)">
    <ellipse cx="375" cy="100" rx="300" ry="80" fill="#90EE90" opacity="0.5"/>
    <ellipse cx="375" cy="100" rx="250" ry="60" fill="#3CB371" opacity="0.3"/>
  </g>
</svg>

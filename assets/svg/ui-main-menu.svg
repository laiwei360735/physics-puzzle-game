<!-- 
  UI 界面 - 主菜单
  尺寸：750x1334px（微信小程序标准）
  用途：游戏主菜单界面
-->
<svg viewBox="0 0 750 1334" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 天空背景渐变 -->
    <linearGradient id="skyBG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B0E0E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 按钮渐变 -->
    <linearGradient id="btnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 面板渐变 -->
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="750" height="1334" fill="url(#skyBG)"/>
  
  <!-- 装饰云朵（背景） -->
  <g opacity="0.6">
    <ellipse cx="150" cy="200" rx="80" ry="50" fill="#FFFFFF"/>
    <ellipse cx="200" cy="220" rx="70" ry="45" fill="#FFFFFF"/>
    <ellipse cx="550" cy="150" rx="90" ry="55" fill="#FFFFFF"/>
    <ellipse cx="600" cy="170" rx="75" ry="48" fill="#FFFFFF"/>
  </g>
  
  <!-- 太阳 -->
  <g transform="translate(550, 50)">
    <circle cx="60" cy="60" r="40" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
    <circle cx="50" cy="50" r="12" fill="#FFFFFF" opacity="0.5"/>
    <!-- 光芒 -->
    <g stroke="#FFD700" stroke-width="4" stroke-linecap="round">
      <line x1="60" y1="10" x2="60" y2="25"/>
      <line x1="60" y1="95" x2="60" y2="110"/>
      <line x1="10" y1="60" x2="25" y2="60"/>
      <line x1="95" y1="60" x2="110" y2="60"/>
      <line x1="25" y1="25" x2="35" y2="35"/>
      <line x1="95" y1="25" x2="85" y2="35"/>
      <line x1="25" y1="95" x2="35" y2="85"/>
      <line x1="95" y1="95" x2="85" y2="85"/>
    </g>
  </g>
  
  <!-- 游戏标题面板 -->
  <g transform="translate(75, 250)">
    <!-- 面板背景 -->
    <rect x="0" y="0" width="600" height="180" rx="30" fill="url(#panelGradient)" stroke="#8B4513" stroke-width="4"/>
    <rect x="10" y="10" width="580" height="160" rx="25" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    
    <!-- 标题文字（用图形表示） -->
    <g transform="translate(300, 90)">
      <!-- 物 -->
      <rect x="-120" y="-40" width="50" height="80" rx="8" fill="#8B4513"/>
      <rect x="-95" y="-20" width="20" height="40" fill="#FFFFFF" opacity="0.3"/>
      <!-- 理 -->
      <circle cx="-20" y="-10" r="35" fill="#FFA500" stroke="#8B4513" stroke-width="3"/>
      <circle cx="-20" y="-15" r="12" fill="#FFFFFF" opacity="0.4"/>
      <!-- 小 -->
      <path d="M 40 -40 L 60 0 L 80 -40" fill="#FF69B4" stroke="#8B4513" stroke-width="3" stroke-linejoin="round"/>
      <!-- 游 -->
      <circle cx="140" y="-10" r="30" fill="#87CEEB" stroke="#8B4513" stroke-width="3"/>
      <circle cx="130" y="-15" r="10" fill="#FFFFFF" opacity="0.4"/>
      <!-- 戏 -->
      <rect x="180" y="-35" width="60" height="50" rx="10" fill="#90EE90" stroke="#8B4513" stroke-width="3"/>
    </g>
  </g>
  
  <!-- 主角展示 -->
  <g transform="translate(275, 480)">
    <circle cx="100" cy="100" r="90" fill="#FFD700" stroke="#8B4513" stroke-width="4"/>
    <!-- 眼睛 -->
    <ellipse cx="65" cy="85" rx="18" ry="22" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
    <ellipse cx="135" cy="85" rx="18" ry="22" fill="#FFFFFF" stroke="#8B4513" stroke-width="3"/>
    <circle cx="70" cy="88" r="10" fill="#000000"/>
    <circle cx="140" cy="88" r="10" fill="#000000"/>
    <circle cx="73" cy="85" r="4" fill="#FFFFFF"/>
    <circle cx="143" cy="85" r="4" fill="#FFFFFF"/>
    <!-- 腮红 -->
    <circle cx="40" cy="115" r="15" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="160" cy="115" r="15" fill="#FFB6C1" opacity="0.6"/>
    <!-- 嘴巴 -->
    <path d="M 70 130 Q 100 150 130 130" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 高光 -->
    <ellipse cx="70" cy="55" rx="20" ry="12" fill="#FFFFFF" opacity="0.4"/>
  </g>
  
  <!-- 开始游戏按钮 -->
  <g transform="translate(175, 720)">
    <rect x="0" y="0" width="400" height="100" rx="25" fill="url(#btnGradient)" stroke="#8B4513" stroke-width="5"/>
    <rect x="10" y="10" width="380" height="80" rx="20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    <!-- 按钮文字 -->
    <text x="200" y="65" font-family="Arial Rounded MT Bold, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">开始游戏</text>
    <!-- 按钮阴影 -->
    <rect x="0" y="95" width="400" height="10" rx="5" fill="#8B4513" opacity="0.3"/>
  </g>
  
  <!-- 关卡选择按钮 -->
  <g transform="translate(175, 850)">
    <rect x="0" y="0" width="400" height="80" rx="20" fill="#FFFFFF" stroke="#8B4513" stroke-width="4"/>
    <text x="200" y="52" font-family="Arial Rounded MT Bold, sans-serif" font-size="36" font-weight="bold" fill="#8B4513" text-anchor="middle">关卡选择</text>
  </g>
  
  <!-- 设置按钮 -->
  <g transform="translate(175, 960)">
    <rect x="0" y="0" width="400" height="80" rx="20" fill="#FFFFFF" stroke="#8B4513" stroke-width="4"/>
    <text x="200" y="52" font-family="Arial Rounded MT Bold, sans-serif" font-size="36" font-weight="bold" fill="#8B4513" text-anchor="middle">设置</text>
  </g>
  
  <!-- 底部装饰草地 -->
  <g transform="translate(0, 1184)">
    <path d="M 0 50 Q 50 30 100 50 Q 150 70 200 50 Q 250 30 300 50 Q 350 70 400 50 Q 450 30 500 50 Q 550 70 600 50 Q 650 30 700 50 Q 750 70 800 50 L 800 150 L 0 150 Z" fill="#90EE90"/>
    <path d="M 0 50 Q 50 30 100 50 Q 150 70 200 50 Q 250 30 300 50 Q 350 70 400 50 Q 450 30 500 50 Q 550 70 600 50 Q 650 30 700 50 Q 750 70 800 50" stroke="#3CB371" stroke-width="3" fill="none"/>
  </g>
  
  <!-- 版本号 -->
  <text x="375" y="1300" font-family="Verdana, sans-serif" font-size="20" fill="#8B4513" text-anchor="middle" opacity="0.6">v1.0.0</text>
</svg>
